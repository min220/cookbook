<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>made with love & flour</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="scene">
    <div id="book">

      <div id="book-left-half">
        <div id="book-spine"></div>
        <div id="book-cover">
          <div id="book-cover-front">
            <div class="book-elastic"></div>
            <div class="book-mark"></div>
            <div class="book-title">recipes</div>
            <div class="book-hint">open</div>
          </div>
          <div id="book-cover-back"></div>
        </div>
      </div>

      <div id="book-right-half">
        <div id="book-pages"></div>
      </div>

      <div id="book-inner">
        <div id="top-bar">
          <button id="btn-close">✕</button>
          <span id="top-label"></span>
          <div id="nav">
            <button id="btn-prev">←</button>
            <button id="btn-next">→</button>
          </div>
        </div>
        <div id="pages">
          <div id="page-left"><div class="page-inner" id="inner-left"></div></div>
          <div id="page-right"><div class="page-inner" id="inner-right"></div></div>
        </div>
      </div>

    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
