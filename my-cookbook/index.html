<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>made with love & flour</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- the small closed notebook -->
  <div id="scene">
    <div id="notebook">
      <div id="nb-spine"></div>
      <div id="nb-elastic"></div>
      <div id="nb-mark"></div>
      <div id="nb-label">recipes</div>
      <div id="nb-hint">open</div>
    </div>
  </div>

  <!-- the full spread — hidden until book opens -->
  <div id="spread" class="hidden">

    <div id="top-bar">
      <button id="btn-close">✕ close</button>
      <span id="top-label"></span>
      <div id="nav">
        <button id="btn-prev">←</button>
        <button id="btn-next">→</button>
      </div>
    </div>

    <!-- the two pages -->
    <div id="pages">
      <div id="page-left">
        <div class="page-inner" id="inner-left"></div>
      </div>
      <div id="page-right">
        <div class="page-inner" id="inner-right"></div>
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
